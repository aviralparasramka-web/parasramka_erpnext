[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "parasramka_erpnext"
version = "0.0.1"
description = "Custom ERP for Parasramka Engineering Pvt. Ltd. — Defence & Railways heavy engineering"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [
    { name = "Parasramka Engineering Pvt. Ltd.", email = "aviral.parasramka@gmail.com" }
]
dependencies = ["frappe"]

[project.urls]
Homepage   = "https://github.com/aviralparasramka-web/parasramka_erpnext"
Repository = "https://github.com/aviralparasramka-web/parasramka_erpnext"

[tool.setuptools.packages.find]
where = ["."]
include = ["parasramka_erpnext*"]

[tool.setuptools.package-data]
"*" = ["*.json", "*.js", "*.css", "*.html", "*.md"]

[tool.frappe]
frappe_version = ">=15.0.0,<17.0.0"
