[build-system]
requires = ["setuptools>=45", "setuptools.backends"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "parasramka_erpnext"
version = "0.0.1"
description = "Custom ERP for Parasramka Engineering Pvt. Ltd."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [
    { name = "Parasramka Engineering Pvt. Ltd.", email = "aviral.parasramka@gmail.com" }
]
dependencies = []

[tool.bench.frappe-dependencies]
frappe = ">=15.0.0,<=17.0.0"

[tool.uv.extra-build-dependencies]
parasramka_erpnext = ["setuptools.backends"]
